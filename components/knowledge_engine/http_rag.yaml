apiVersion: v1
kind: KnowledgeEngine
metadata:
  name: http_rag
  label:
    en_US: HTTP RAG Connector
    zh_Hans: HTTP RAG 连接器
  description:
    en_US: Generic connector for any RAG service with HTTP API. Define request templates and response mappings to connect to any knowledge base.
    zh_Hans: 通用 HTTP RAG 连接器，可对接任何提供 HTTP API 的知识库服务。通过定义请求模板和响应字段映射即可完成对接。
spec:
  creation_schema:
    # ── Connection ──
    - name: api_base_url
      label:
        en_US: API Base URL
        zh_Hans: API 基础地址
      description:
        en_US: 'Base URL of the RAG service. Only fill the host/base prefix, not the full retrieval URL. Example for Dify: https://api.dify.ai/v1'
        zh_Hans: 'RAG 服务的基础地址，只填基础地址，不要填完整检索 URL。按 Dify 示例可填 https://api.dify.ai/v1'
      type: string
      default: https://api.dify.ai/v1
      required: true

    - name: api_key
      label:
        en_US: API Key
        zh_Hans: API 密钥
      description:
        en_US: 'API key used for authentication. It will be sent in the Authorization header.'
        zh_Hans: '用于认证的 API 密钥。后端会把它放进 Authorization 请求头中。如果没有就不填。'
      type: password
      required: flase

    - name: auth_header_prefix
      label:
        en_US: Auth Header Prefix
        zh_Hans: 认证头前缀
      description:
        en_US: 'Prefix before API key in Authorization header (default: Bearer)'
        zh_Hans: 'Authorization 请求头中 API 密钥前的前缀（默认：Bearer）'
      type: string
      default: Bearer
      required: false

    # ── Retrieval ──
    - name: retrieve_endpoint
      label:
        en_US: Retrieval Endpoint
        zh_Hans: 检索接口路径
      description:
        en_US: 'Retrieval API path only. Final URL = API Base URL + this path. Supports {{ dataset_id }}. Dify example: /datasets/{{ dataset_id }}/retrieve'
        zh_Hans: '只填写检索接口路径。最终请求地址 = API Base URL + 这里的路径。支持 {{ dataset_id }}。Dify 示例：/datasets/{{ dataset_id }}/retrieve'
      type: string
      default: /datasets/{{ dataset_id }}/retrieve
      required: true

    - name: retrieve_body_template
      label:
        en_US: Retrieval Request Body Template
        zh_Hans: 检索请求体模板
      description:
        en_US: |
          JSON template for the retrieval request body. Use {{ variable }} for dynamic values.
          query/top_k/similarity_threshold will be substituted at runtime.
          Default example is compatible with Dify Dataset retrieval API.
        zh_Hans: |
          检索请求的 JSON 模板，使用 {{ variable }} 插入动态值。
          运行时会自动替换 query、top_k、similarity_threshold、dataset_id。
          默认值已按 Dify Dataset 检索接口给出，可直接作为示例修改。
      type: text
      default: |
        {
          "query": "{{ query }}",
          "retrieval_model": {
            "search_method": "semantic_search",
            "reranking_enable": false,
            "reranking_mode": null,
            "reranking_model": {
              "reranking_provider_name": "",
              "reranking_model_name": ""
            },
            "weights": null,
            "top_k": {{ top_k }},
            "score_threshold_enabled": true,
            "score_threshold": {{ similarity_threshold }}
          }
        }
      required: true

    - name: retrieve_results_path
      label:
        en_US: Results Array Path
        zh_Hans: 结果数组路径
      description:
        en_US: 'Dot-separated path to the result array in the response JSON. Dify example: records'
        zh_Hans: '响应 JSON 中结果数组的点分路径。Dify 示例：records'
      type: string
      default: records
      required: true

    - name: retrieve_content_fields
      label:
        en_US: Content Field(s)
        zh_Hans: 内容字段
      description:
        en_US: 'Field name(s) used as the final chunk text. Comma-separated for multiple fields. Supports dot notation. Dify example: segment.content'
        zh_Hans: '结果中会被当成最终知识文本的字段名，多个字段可用逗号分隔，支持点分路径。Dify 示例：segment.content'
      type: string
      default: segment.content
      required: true

    - name: retrieve_score_field
      label:
        en_US: Score Field
        zh_Hans: 分数字段
      description:
        en_US: 'Field name for similarity/relevance score in each result. Supports dot notation. Dify example: score. Leave empty if unavailable.'
        zh_Hans: '每条结果中的相似度/相关度分数字段，支持点分路径。Dify 示例：score。没有就留空。'
      type: string
      default: score
      required: false

    - name: retrieve_id_field
      label:
        en_US: ID Field
        zh_Hans: ID 字段
      description:
        en_US: 'Field name for the unique result ID. Supports dot notation. Dify example: segment.id. Leave empty if unavailable.'
        zh_Hans: '每条结果唯一 ID 的字段名，支持点分路径。Dify 示例：segment.id。没有就留空。'
      type: string
      default: segment.id
      required: false

    - name: dataset_id
      label:
        en_US: Dataset ID
        zh_Hans: 数据集 ID
      description:
        en_US: 'Dataset/knowledge base ID. If your endpoint or body contains {{ dataset_id }}, it will be substituted with this value.'
        zh_Hans: '数据集/知识库 ID。如果你的接口路径或请求体里用了 {{ dataset_id }}，运行时会替换成这里的值。'
      type: string
      default: ''
      required: false

    # ── Ingestion (optional) ──
    - name: enable_ingestion
      label:
        en_US: Enable File Upload
        zh_Hans: 启用文件上传
      description:
        en_US: 'Enable uploading files to the RAG service'
        zh_Hans: '启用向 RAG 服务上传文件的功能'
      type: boolean
      default: false
      required: false

    - name: ingest_endpoint
      label:
        en_US: Upload Endpoint
        zh_Hans: 上传接口路径
      description:
        en_US: 'Upload API path only. Supports {{ dataset_id }}. Dify example: /datasets/{{ dataset_id }}/document/create-by-file'
        zh_Hans: '只填写上传接口路径，支持 {{ dataset_id }}。Dify 示例：/datasets/{{ dataset_id }}/document/create-by-file'
      type: string
      default: /datasets/{{ dataset_id }}/document/create-by-file
      required: false
      show_if:
        field: enable_ingestion
        operator: eq
        value: true

    - name: ingest_file_field
      label:
        en_US: File Field Name
        zh_Hans: 文件字段名
      description:
        en_US: 'Multipart form field name for the file. Dify uses file.'
        zh_Hans: '上传表单中文件字段的名称。Dify 默认使用 file。'
      type: string
      default: file
      required: false
      show_if:
        field: enable_ingestion
        operator: eq
        value: true

    - name: ingest_extra_body
      label:
        en_US: Upload Extra Data
        zh_Hans: 上传附加数据
      description:
        en_US: 'Optional JSON data sent alongside the file as the "data" form field. Supports {{ variable }} substitution. Default value matches Dify upload API.'
        zh_Hans: '上传文件时附带的 JSON 数据，会作为表单中的 "data" 字段发送，支持 {{ variable }} 替换。默认值按 Dify 上传接口填写。'
      type: text
      default: |
        {
          "indexing_technique": "high_quality",
          "process_rule": {
            "mode": "automatic"
          }
        }
      required: false
      show_if:
        field: enable_ingestion
        operator: eq
        value: true

    - name: ingest_doc_id_path
      label:
        en_US: Document ID Response Path
        zh_Hans: 文档 ID 响应路径
      description:
        en_US: 'Dot-separated path used to extract the document ID from the upload response. Dify example: document.id'
        zh_Hans: '上传成功后，从响应中提取文档 ID 的点分路径。Dify 示例：document.id'
      type: string
      default: document.id
      required: false
      show_if:
        field: enable_ingestion
        operator: eq
        value: true

    # ── Deletion (optional) ──
    - name: enable_deletion
      label:
        en_US: Enable Document Deletion
        zh_Hans: 启用文档删除
      description:
        en_US: 'Enable deleting documents from the RAG service'
        zh_Hans: '启用从 RAG 服务中删除文档的功能'
      type: boolean
      default: false
      required: false

    - name: delete_endpoint
      label:
        en_US: Delete Endpoint
        zh_Hans: 删除接口路径
      description:
        en_US: 'Delete API path only. Supports {{ document_id }} and {{ dataset_id }}. Dify example: /datasets/{{ dataset_id }}/documents/{{ document_id }}'
        zh_Hans: '只填写删除接口路径，支持 {{ document_id }} 和 {{ dataset_id }}。Dify 示例：/datasets/{{ dataset_id }}/documents/{{ document_id }}'
      type: string
      default: /datasets/{{ dataset_id }}/documents/{{ document_id }}
      required: false
      show_if:
        field: enable_deletion
        operator: eq
        value: true

    - name: delete_method
      label:
        en_US: Delete HTTP Method
        zh_Hans: 删除请求方法
      description:
        en_US: 'HTTP method for deletion'
        zh_Hans: '删除请求使用的 HTTP 方法'
      type: select
      default: DELETE
      options:
        - name: DELETE
          label:
            en_US: DELETE
            zh_Hans: DELETE
        - name: POST
          label:
            en_US: POST
            zh_Hans: POST
      required: false
      show_if:
        field: enable_deletion
        operator: eq
        value: true

    - name: delete_body_template
      label:
        en_US: Delete Request Body Template
        zh_Hans: 删除请求体模板
      description:
        en_US: 'Optional JSON body for deletion. Supports {{ document_id }} and {{ dataset_id }}. Leave empty if the delete API does not need a request body.'
        zh_Hans: '删除请求体模板，可使用 {{ document_id }} 和 {{ dataset_id }}。如果删除接口本身不需要请求体，就留空。'
      type: text
      default: ''
      required: false
      show_if:
        field: enable_deletion
        operator: eq
        value: true

  retrieval_schema:
    - name: top_k
      label:
        en_US: Top K
        zh_Hans: 返回数量
      description:
        en_US: 'Maximum number of results to return (available as {{ top_k }} in template)'
        zh_Hans: '最多返回的结果数量（可在模板中通过 {{ top_k }} 引用）'
      type: integer
      default: 5
      required: false

    - name: similarity_threshold
      label:
        en_US: Similarity Threshold
        zh_Hans: 相似度阈值
      description:
        en_US: 'Minimum similarity score 0-1 (available as {{ similarity_threshold }} in template)'
        zh_Hans: '最低相似度分数 0-1（可在模板中通过 {{ similarity_threshold }} 引用）'
      type: float
      default: 0.2
      required: false

execution:
  python:
    path: http_rag.py
    attr: HttpRag
