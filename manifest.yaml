apiVersion: v1
kind: Plugin
metadata:
  author: huanghuoguoguo
  name: HttpRAGConnector
  repository: 'https://github.com/huanghuoguoguo/HttpRAGConnector'
  version: 0.1.0
  description:
    en_US: Generic HTTP RAG connector for any RAG service with HTTP API. Define request templates and response mappings to connect to any knowledge base.
    zh_Hans: 通用 HTTP RAG 连接器，可对接任何提供 HTTP API 的知识库服务。通过定义请求模板和响应字段映射即可完成对接。
  label:
    en_US: HTTP RAG Connector
    zh_Hans: HTTP RAG 连接器
  icon: assets/icon.svg
spec:
  config: []
  components:
    KnowledgeEngine:
      fromFiles:
        - components/knowledge_engine/http_rag.yaml
execution:
  python:
    path: main.py
    attr: HttpRAGConnector
